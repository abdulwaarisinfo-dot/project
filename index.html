
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Flintel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fustat:wght@400..800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;background:#FAFAF9;color:#171717;overflow-x:clip;}
h1,.logo{font-family:"Fustat","Inter",sans-serif;}
:root{
  --ink:#171717;--g1:rgba(23,23,23,.8);--g2:rgba(23,23,23,.55);--g3:rgba(23,23,23,.38);--g4:rgba(23,23,23,.14);
  --hair:rgba(23,23,23,.08);--blue:#6863FC;--bluedeep:#4B46D6;--lime:#B6FF1E;--limedeep:#8FCC00;
  --ease:cubic-bezier(.25,.1,.25,1);--navh:72px;
}

nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;height:var(--navh);padding:0 max(24px,4vw);background:rgba(250,250,249,.7);backdrop-filter:saturate(160%) blur(16px);-webkit-backdrop-filter:saturate(160%) blur(16px);border-bottom:1px solid var(--hair);}
.logo{display:flex;align-items:center;gap:9px;font-size:15.5px;font-weight:700;letter-spacing:-.01em;color:var(--ink);}
.logo-icon{width:27px;height:27px;background:var(--ink);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(23,23,23,.25),inset 0 1px 1px rgba(255,255,255,.15);}
.logo-icon svg{width:13px;height:13px;fill:var(--lime);}
.nav-login{font-size:13.5px;font-weight:600;color:var(--ink);background:#fff;border:1px solid var(--g4);padding:9px 18px;border-radius:980px;cursor:pointer;transition:transform .15s var(--ease),box-shadow .15s var(--ease),border-color .15s;box-shadow:0 1px 2px rgba(0,0,0,.03);}
.nav-login:hover{border-color:var(--g3);transform:translateY(-1px);box-shadow:0 6px 14px rgba(0,0,0,.08);}
.nav-login:active{transform:translateY(0);}

.stage{min-height:100vh;padding-top:var(--navh);display:flex;flex-direction:column;align-items:center;justify-content:center;padding-left:24px;padding-right:24px;padding-bottom:24px;text-align:center;}

/* ═══ SIDEBAR (added alongside the existing top nav) ═══ */
.shell-body{display:flex;padding-top:var(--navh);min-height:100vh;}
.sidebar{width:264px;flex-shrink:0;background:#F4F2EC;border-right:1px solid var(--hair);height:calc(100vh - var(--navh));position:sticky;top:var(--navh);padding:20px 20px 16px;display:flex;flex-direction:column;}
.side-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.side-header-logo{width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--ink);}
.side-header-logo svg{width:100%;height:100%;fill:var(--ink);}
.side-header-collapse{width:26px;height:26px;background:none;border:none;display:flex;align-items:center;justify-content:center;color:var(--g2);cursor:pointer;opacity:.75;transition:opacity .15s;}
.side-header-collapse:hover{opacity:1;}
.side-header-collapse svg{width:20px;height:20px;}

.side-new{display:flex;align-items:center;gap:11px;background:rgba(23,23,23,.065);border:none;border-radius:980px;padding:13px 16px;font-size:16px;font-weight:600;color:var(--ink);cursor:pointer;margin-bottom:14px;transition:background .15s;text-align:left;width:100%;}
.side-new:hover{background:rgba(23,23,23,.1);}
.side-new-icon{width:24px;height:24px;border-radius:50%;background:rgba(23,23,23,.1);color:var(--g1);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.side-new-icon svg{width:13px;height:13px;}

.side-nav{display:flex;flex-direction:column;margin-bottom:6px;}
.side-item{display:flex;align-items:center;gap:13px;padding:10px 8px;border-radius:9px;font-size:16px;font-weight:400;color:var(--g1);cursor:pointer;transition:background .15s;}
.side-item:hover{background:rgba(23,23,23,.05);}
.side-item svg{width:19px;height:19px;color:var(--g1);flex-shrink:0;}

.side-label{display:none;}
.side-sub{display:flex;flex-direction:column;margin-bottom:20px;}
.side-sub-item{padding:8px 8px 8px 40px;font-size:15px;font-weight:400;color:rgba(23,23,23,.55);cursor:pointer;transition:color .15s;border-radius:9px;}
.side-sub-item:hover{color:var(--ink);}

.side-history-label{display:flex;align-items:center;gap:13px;padding:10px 8px;font-size:16px;font-weight:400;color:var(--g1);margin-bottom:2px;}
.side-history-label svg{width:19px;height:19px;color:var(--g1);}
.side-history-empty{padding:4px 8px 4px 40px;font-size:14.5px;color:rgba(23,23,23,.4);}

.side-bottom{margin-top:auto;padding-top:16px;border-top:1px solid var(--hair);}
.side-signin{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;padding:8px;cursor:pointer;border-radius:9px;transition:background .15s;}
.side-signin:hover{background:rgba(23,23,23,.05);}
.side-signin-left{display:flex;align-items:center;gap:11px;}
.side-signin-avatar{width:28px;height:28px;border-radius:50%;background:#0F6E56;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.side-signin-avatar svg{width:15px;height:15px;color:#fff;}
.side-signin-text{font-size:16px;font-weight:500;color:var(--ink);}
.side-signin svg.chev{width:17px;height:17px;color:var(--g2);flex-shrink:0;}
.main{flex:1;min-width:0;}

.icon-row-wrap{position:relative;display:inline-block;margin-bottom:26px;opacity:0;animation:riseIn .7s var(--ease) forwards;}
.icon-row-glow{position:absolute;inset:-36px -20px;background:radial-gradient(ellipse at center,rgba(104,99,252,.22),rgba(182,255,30,.14) 55%,transparent 78%);filter:blur(28px);z-index:0;pointer-events:none;}
.icon-row{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:14px;}
.icon-tile{width:54px;height:54px;border-radius:17px;display:flex;align-items:center;justify-content:center;position:relative;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.55);transition:transform .22s var(--ease),box-shadow .22s var(--ease);}
.icon-tile:hover{transform:translateY(-5px) scale(1.06);}
.icon-tile svg{width:34px;height:34px;position:relative;z-index:1;}
.icon-tile::after{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(155deg,rgba(255,255,255,.55),rgba(255,255,255,0) 45%);pointer-events:none;}
.icon-tile.reddit{background:#FF4500;}
.icon-tile.x{background:#0A0A0A;}
.icon-tile.linkedin{background:#0A66C2;}
.icon-tile.facebook{background:#1877F2;}

.greeting{font-size:clamp(24px,3.4vw,34px);font-weight:600;letter-spacing:-.03em;color:var(--ink);margin-bottom:32px;opacity:0;animation:riseIn .7s var(--ease) forwards;animation-delay:.1s;}
.greeting span{color:var(--g3);font-weight:400;}

.query-wrap{width:100%;max-width:640px;opacity:0;animation:riseIn .8s var(--ease) forwards;animation-delay:.25s;}
.query-box{background:#fff;border:1px solid var(--hair);border-radius:26px;box-shadow:0 1px 2px rgba(0,0,0,.03),0 12px 32px rgba(0,0,0,.06);padding:6px;transition:border-color .2s,box-shadow .2s;}
.query-box:focus-within{border-color:var(--g4);box-shadow:0 1px 2px rgba(0,0,0,.03),0 16px 40px rgba(0,0,0,.09);}
.query-input-row{display:flex;align-items:center;gap:10px;padding:14px 10px 14px 20px;}
.query-icon{width:18px;height:18px;color:var(--g3);flex-shrink:0;}
.query-input-row input{flex:1;min-width:0;border:none;outline:none;background:transparent;font-size:16px;color:var(--ink);font-family:inherit;}
.query-input-row input::placeholder{color:var(--g3);}
.query-actions{display:flex;align-items:center;justify-content:space-between;padding:2px 8px 8px 20px;}
.query-hint{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--g3);}
.query-hint svg{width:13px;height:13px;}
.query-submit{width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 32% 28%,#5c5c5c 0%,#1c1c1c 45%,#000 100%);border:1px solid rgba(255,255,255,.06);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s var(--ease),box-shadow .15s var(--ease);flex-shrink:0;box-shadow:0 3px 8px rgba(0,0,0,.35),inset 0 1px 2px rgba(255,255,255,.28),inset 0 -4px 6px rgba(0,0,0,.55);}
.query-submit:hover{transform:translateY(-1px) scale(1.04);box-shadow:0 6px 14px rgba(0,0,0,.4),inset 0 1px 2px rgba(255,255,255,.32),inset 0 -4px 6px rgba(0,0,0,.55);}
.query-submit:active{transform:scale(.94);}
.query-submit svg{width:16px;height:16px;color:#fff;}

.chip-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:18px;opacity:0;animation:riseIn .8s var(--ease) forwards;animation-delay:.4s;}
.chip{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;color:var(--g2);background:#fff;border:1px solid var(--hair);padding:8px 14px;border-radius:980px;cursor:pointer;transition:border-color .15s,color .15s;}
.chip:hover{border-color:var(--g3);color:var(--ink);}
.chip svg{width:12px;height:12px;flex-shrink:0;}

.foot-note{margin-top:26px;font-size:12px;color:var(--g3);opacity:0;animation:riseIn .8s var(--ease) forwards;animation-delay:.5s;}

@keyframes riseIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:900px){
  .sidebar{display:none;}
}
@media(max-width:560px){
  .query-input-row{padding:12px 6px 12px 16px;}
  .query-input-row input{font-size:15px;}
  .chip-row{gap:6px;}
  .chip{padding:7px 12px;font-size:12px;}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;opacity:1!important;}}
</style>
</head>
<body>

<nav>
  <a class="logo" href="#"><div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2.5c.5 4.2 2.8 6.5 7 7-4.2.5-6.5 2.8-7 7-.5-4.2-2.8-6.5-7-7 4.2-.5 6.5-2.8 7-7z"/></svg></div>Flintel</a>
  <button class="nav-login">Log in</button>
</nav>

<div class="stage">
  <div class="icon-row-wrap">
    <div class="icon-row-glow"></div>
    <div class="icon-row">
      <div class="icon-tile reddit"><svg viewBox="0 0 24 24"><circle cx="9" cy="13" r="1.6" fill="#fff"/><circle cx="15" cy="13" r="1.6" fill="#fff"/><path d="M8.4 15.8c.9.8 2.2 1.3 3.6 1.3s2.7-.5 3.6-1.3" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round"/><circle cx="12" cy="7.4" r="1.1" fill="#fff"/><line x1="12" y1="8.5" x2="12" y2="10" stroke="#fff" stroke-width="1.2"/></svg></div>
      <div class="icon-tile x"><svg viewBox="0 0 24 24"><path d="M6.5 6.5l11 11M17.5 6.5l-11 11" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg></div>
      <div class="icon-tile linkedin"><svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="1.8" fill="#fff"/><rect x="6.4" y="11.5" width="3.2" height="9" rx="0.6" fill="#fff"/><path d="M12.3 11.5h3v1.5c.6-1 1.7-1.7 3-1.7 2.3 0 3.6 1.5 3.6 4.3v5h-3v-4.4c0-1.1-.4-2-1.6-2-.9 0-1.5.6-1.8 1.2-.1.2-.1.6-.1.9v4.3h-3V11.5z" fill="#fff"/></svg></div>
      <div class="icon-tile facebook"><svg viewBox="0 0 24 24"><path d="M13.6 21v-7.2h2.2l.3-2.6h-2.5V9.5c0-.7.2-1.2 1.3-1.2h1.3V6c-.2 0-1-.1-1.9-.1-1.9 0-3.1 1.1-3.1 3.2v2.1H9v2.6h2.2V21h2.4z" fill="#fff"/></svg></div>
    </div>
  </div>
  <h1 class="greeting">Where's your next customer <span>talking?</span></h1>

  <div class="query-wrap">
    <div class="query-box">
      <div class="query-input-row">
        <svg class="query-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18z"/></svg>
        <input id="query-input" type="text" placeholder="yourwebsite.com" autofocus onkeydown="if(event.key==='Enter')submitQuery()">
      </div>
      <div class="query-actions">
        <div class="query-hint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg>Ready in seconds</div>
        <button class="query-submit" onclick="submitQuery()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><polyline points="13 5 20 12 13 19"/></svg>
        </button>
      </div>
    </div>

    <div class="chip-row">
      <div class="chip" onclick="tryExample('acmepay.com')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>Try acmepay.com</div>
      <div class="chip" onclick="tryExample('shieldsec.io')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6z"/></svg>Try shieldsec.io</div>
      <div class="chip" onclick="tryExample('crmflow.com')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.9 3.1-7 7-7s7 3.1 7 7"/></svg>Try crmflow.com</div>
    </div>
  </div>

  <div class="foot-note">Free report · No card required · Built for six industries</div>
</div>

<script>
'use strict';
function normalizeDomain(raw) {
  let v = String(raw || '').trim().toLowerCase().replace(/^https?:\/\//, '').replace(/^www\./, '').split(/[/?#]/)[0];
  return /^[a-z0-9]([a-z0-9-]*[a-z0-9])?(\.[a-z0-9]([a-z0-9-]*[a-z0-9])?)+$/.test(v) ? v : null;
}
function submitQuery() {
  const input = document.getElementById('query-input');
  const domain = normalizeDomain(input.value);
  if (!domain) { input.focus(); return; }
  alert('Would proceed to scanning: ' + domain);
}
function tryExample(domain) {
  document.getElementById('query-input').value = domain;
  submitQuery();
}
</script>
</body>
</html>
